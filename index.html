<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>YY Lazy Anagram Maker</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <h1>YY Lazy Anagram Maker</h1>
        <textarea id="source_text" placeholder="Enter text here..."></textarea>
        <div id="buttons_container">
            <button id="exec" class="exec">Exec</button>
            <button id="exec_fast" class="exec">
                Fast Exec <wbr />(No&nbsp;Emoji)
            </button>
            <button id="exec_random" class="exec">Exec Random</button>
            <button id="exec_fast_random" class="exec">
                Fast Exec Random <wbr />(No&nbsp;Emoji)
            </button>
        </div>
        <textarea id="output_text" readonly></textarea>

        <script defer type="module" src="scripts.js"></script>
    </body>
</html>
